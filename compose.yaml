# version: '3.8'
services:
  app:
    image: single-session-bot:latest
    build: .
    volumes:
      - single-session-vol:/bot/data
    ports:
      - 8081
    depends_on:
      redis:
        condition: service_started
    environment:
      REDIS_PORT: 6379
      REDIS_HOST: "ss-redis"
  
  redis:
    image: "redis:alpine" 
    hostname: ss-redis
    restart: on-failure
    ports:
    - 8070:8070
    - 8443:8443
    - 9443:9443
    - 6379:6379
    
volumes:
  # Persistent storage for your application data (optional)
  single-session-vol:
    {}

networks:
  default: